<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main">
    <div class="weatherForm">
        <h4>Search City: </h4>
        <form id="weatherForm">
            <input type="text" id="city">
            <input type="submit" value="Search">
        </form>
        <h3>Search History</h3>
        <div class="history"></div>
    </div>
    <div class="info"></div>
    </div>
        <div class="console">
            <h3>Console - Event Loop</h3>
            <p class="sync">Sync Start → Sync End</p>
            <p class="async">[ASYNC] Start fetching → Promise.then (Microtask) → setTimeout (Macrotask)</p>
            <p class="async highlight">[ASYNC] Data received</p>
        </div>
    <script src="script.js"></script>
</body>
</html>
